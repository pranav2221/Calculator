<!DOCTYPE html>
<html>
<head>
    <title>DevOps Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="calculator">
    <div class="display">
        <div id="expression"></div>
        <input type="text" id="result" disabled>
    </div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

    <div class="history">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>
</div>

<script>
let expression = "";
let history = [];

function appendValue(val) {
    expression += val;
    updateDisplay();
}

function clearDisplay() {
    expression = "";
    updateDisplay();
    document.getElementById("result").value = "";
}

function deleteLast() {
    expression = expression.slice(0, -1);
    updateDisplay();
}

function updateDisplay() {
    document.getElementById("expression").innerText = expression;
}

async function calculate() {
    try {
        let match = expression.match(/(\d+\.?\d*)([\+\-\*\/])(\d+\.?\d*)/);

        if (!match) {
            document.getElementById("result").value = "Error";
            return;
        }

        let num1 = match[1];
        let op = match[2];
        let num2 = match[3];

        let map = { '+': 'add', '-': 'sub', '*': 'mul', '/': 'div' };

        let res = await fetch(`/calculate?num1=${num1}&num2=${num2}&operation=${map[op]}`);
        let data = await res.json();

        let result = data.result;
        document.getElementById("result").value = result;

        history.unshift(`${expression} = ${result}`);
        updateHistory();

    } catch {
        document.getElementById("result").value = "Error";
    }
}

function updateHistory() {
    let list = document.getElementById("historyList");
    list.innerHTML = "";
    history.slice(0, 5).forEach(item => {
        let li = document.createElement("li");
        li.innerText = item;
        list.appendChild(li);
    });
}

// Keyboard Support
document.addEventListener("keydown", function(event) {
    let key = event.key;

    if (!isNaN(key) || "+-*/.%".includes(key)) {
        appendValue(key);
    } else if (key === "Enter") {
        calculate();
    } else if (key === "Backspace") {
        deleteLast();
    } else if (key === "Escape") {
        clearDisplay();
    }
});
</script>

</body>
</html>
